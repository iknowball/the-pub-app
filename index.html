<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Pub App – Support</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.1);
            max-width: 540px;
            width: 90%;
            padding: 48px 40px;
            text-align: center;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 8px;
        }
        .tagline {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 32px;
        }
        p {
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 24px;
        }
        a.email-link {
            display: inline-block;
            background-color: #f5a623;
            color: #fff;
            text-decoration: none;
            font-size: 1.05rem;
            font-weight: 600;
            padding: 14px 28px;
            border-radius: 8px;
            transition: background-color 0.2s;
        }
        a.email-link:hover {
            background-color: #e0931a;
        }
        .footer {
            margin-top: 40px;
            font-size: 0.85rem;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍺 The Pub App</h1>
        <p class="tagline">Support</p>
        <p>
            Have a question, comment, or need help with The Pub App?<br>
            We'd love to hear from you!
        </p>
        <p>
            Send us an email and we'll get back to you as soon as possible.
        </p>
        <a class="email-link" href="mailto:lockcityfree@gmail.com">lockcityfree@gmail.com</a>
        <div class="footer">
            &copy; The Pub App
        </div>
    </div>
</body>
</html>
